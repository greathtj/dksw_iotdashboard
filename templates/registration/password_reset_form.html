<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --gui-bg: #1e1e1e; --gui-menubar: #2d2d2d; --gui-border: #3c3c3c; --gui-text: #cccccc; --gui-active: #007acc; }
        body { background-color: #000; color: var(--gui-text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100vh; margin: 0; display: flex; flex-direction: column; }
        .reset-container { display: flex; align-items: center; justify-content: center; flex-grow: 1; }
        .reset-card { background-color: var(--gui-bg); border: 1px solid var(--gui-border); width: 100%; max-width: 400px; }
        .reset-header { border-bottom: 1px solid var(--gui-border); }
        .form-control { background-color: #1a1a1a; border: 1px solid var(--gui-border); color: var(--gui-text); }
        .form-control:focus { background-color: #1a1a1a; border-color: var(--gui-active); color: var(--gui-text); }
        .form-label { color: var(--gui-text); font-size: 13px; }
        .btn-primary { background-color: var(--gui-active); border: none; }
        .btn-primary:hover { background-color: #0062a3; }
        .text-muted { color: #888 !important; }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="card reset-card">
            <div class="card-header reset-header py-3">
                <h5 class="mb-0"><i class="bi bi-key me-2"></i>Reset Password</h5>
            </div>
            <div class="card-body p-4">
                <p class="text-muted small mb-3">Enter your email address below and we'll send you a link to reset your password.</p>
                <form method="post" novalidate>
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_email" class="form-label">Email address</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            {{ form.email }}
                            {% if form.email.errors %}
                                <div class="invalid-feedback d-block">{{ form.email.errors }}</div>
                            {% endif %}
                        </div>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">Send Reset Link</button>
                        <a href="{% url 'login' %}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left me-1"></i> Back to Login
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
