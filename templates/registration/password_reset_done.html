<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Sent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --gui-bg: #1e1e1e; --gui-menubar: #2d2d2d; --gui-border: #3c3c3c; --gui-text: #cccccc; --gui-active: #007acc; }
        body { background-color: #000; color: var(--gui-text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100vh; margin: 0; display: flex; flex-direction: column; }
        .done-container { display: flex; align-items: center; justify-content: center; flex-grow: 1; }
        .done-card { background-color: var(--gui-bg); border: 1px solid var(--gui-border); width: 100%; max-width: 400px; }
        .done-header { border-bottom: 1px solid var(--gui-border); }
        .btn-primary { background-color: var(--gui-active); border: none; }
        .btn-primary:hover { background-color: #0062a3; }
        .text-muted { color: #888 !important; }
    </style>
</head>
<body>
    <div class="done-container">
        <div class="card done-card">
            <div class="card-header done-header py-3">
                <h5 class="mb-0"><i class="bi bi-check-circle me-2 text-success"></i>Email Sent</h5>
            </div>
            <div class="card-body p-4 text-center">
                <i class="bi bi-envelope-check text-success" style="font-size: 3rem;"></i>
                <p class="mt-3 mb-1">We've emailed you instructions for resetting your password.</p>
                <p class="text-muted small">If you don't receive an email, please make sure you've entered the address you registered with.</p>
                <div class="mt-3">
                    <a href="{% url 'login' %}" class="btn btn-primary">
                        <i class="bi bi-box-arrow-in-right me-1"></i> Back to Login
                    </a>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
